---

- ansible.builtin.include_role:
    name: alex.proxmox.removevm

- name: Restore [{{ prop_proxmox.vmid }}]
  shell: |
    path=$( ls -Art /mnt/build-dev/vm-qemu-*/vzdump-qemu-{{ prop_proxmox.templateid }}-*.vma.zst | tail -n 1 )
    qmrestore $path {{ prop_proxmox.vmid }}
    if [ "$?" -eq "0" ]; then
      echo "CHANGED"
    else
      echo "FAILED"
    fi
  args:
    executable: /bin/bash
  async: 3000
  poll: 15
  register: result
  changed_when: '"CHANGED" in result.stdout'
  failed_when: '"FAILED" in result.stdout'
  vars:
    ansible_connection: ssh
    ansible_host: "{{ prop_proxmox.host }}"
  become: true

- name: Read tags [{{ prop_proxmox.vmid }}]
  shell: |
    tagstring=$( qm config {{ prop_proxmox.vmid }} | grep tags )
    IFS=' ' read -ra tags1 <<< "$tagstring"
    IFS=';' read -ra tags2 <<< "${tags1[1]}"
    break=""
    echo -n "{"
    for tag in "${tags2[@]}"; do
      IFS='-' read -ra tags3 <<< "$tag"
      echo -n "$break"
      echo -n '"'
      echo -n "${tags3[0]}"
      echo -n '": "'
      echo -n "${tags3[1]}"
      echo -n '"'
      break=", "
    done
    echo "}"
  args:
    executable: /bin/bash
  register: taglist
  vars:
    ansible_connection: ssh
    ansible_host: "{{ prop_proxmox.host }}"
  become: true

- name: Set Arch [{{ prop_proxmox.vmid }}]
  shell: |
    echo '{{ taglist.stdout }}' | jq -r '.arch'
  args:
    executable: /bin/bash
  register: prop_arch_string
  vars:
    ansible_connection: local
  become: true

- name: Set OS [{{ prop_proxmox.vmid }}]
  shell: |
    echo '{{ taglist.stdout }}' | jq -r '.os'
  args:
    executable: /bin/bash
  register: prop_os_string
  vars:
    ansible_connection: local
  become: true

- name: Setting facts
  ansible.builtin.set_fact:
    prop_device:
      arch: "{{ prop_arch_string.stdout }}"
    prop_os:
      name: "{{ prop_os.name | default('unknown') }}"
      version: "{{ prop_os.version | default('unknown') }}"
      short: "{{ prop_os_string.stdout }}"

- ansible.builtin.include_role:
    name: alex.proxmox.setmeta

- ansible.builtin.include_role:
    name: alex.proxmox.sethardware
