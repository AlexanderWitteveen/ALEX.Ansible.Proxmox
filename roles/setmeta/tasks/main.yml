#   vars:
#     ansible_connection: ssh
#     ansible_host: "{{ prop_proxmox.host }}"
#   become: true

- name: Set Notes [{{ prop_proxmox.vmid }}]
  shell: |
    description=$'# {{ prop_host.hostname }}  \n{{ prop_cmdb.description }}  \n{{ prop_device.arch }}  \n{{ prop_os.short }}  \n{{ prop_host.ipaddress }}  \n{{ prop_cmdb.environment }}  \n'
    description+="$(date)"
    description+=$'  \n'
    if [ "{{ prop_weburl | default('null') }}" != "null" ]; then
      description+=$'<a href="{{ prop_weburl | default("null") }}" target="_blank">web</a>  \n'
    fi
    qm set {{ prop_proxmox.vmid }} --description "$description"
  args:
    executable: /bin/bash
  vars:
    ansible_connection: ssh
    ansible_host: "{{ prop_proxmox.host }}"
  become: true
