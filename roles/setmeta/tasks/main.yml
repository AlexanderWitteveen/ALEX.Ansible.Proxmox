---

- name: Set Name [{{ prop_proxmox.vmid }}]
  shell: |
    name="{{ prop_host.hostname }}-{{ prop_os.short }}-{{ prop_device.arch }}-{{ prop_cmdb.environment }}-{{ prop_proxmox.description }}"
    qm set {{ prop_proxmox.vmid }} --name "$name"
  args:
    executable: /bin/bash
  vars:
    ansible_connection: ssh
    ansible_host: "{{ prop_proxmox.host }}"
  become: true

# - name: Set Tags [{{ prop_proxmox.vmid }}]
#   shell: |
#     tags="arch-{{ prop_device.arch }};os-{{ prop_os.short }};env-{{ prop_cmdb.environment }};type-{{ prop_proxmox.type }}"
